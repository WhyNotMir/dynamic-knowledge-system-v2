[pytest]
pythonpath = .
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --tb=short
markers =
    integration: tests that require a live PostgreSQL with pgvector
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
